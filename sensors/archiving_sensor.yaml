---
  class_name: "ArchivingSensor"
  entry_point: "archiving_sensor.py"
  description: "Sensor which queries processing api for new analyses that should be archived"
  poll_interval: 15 # Every 15 s
  trigger_types:
    -
      name: "archiving_event"
      description: "Trigger which indicates that an analysis is available for archiving"
      payload_schema:
        type: "object"
        properties:
         sequence_run:
           type: "string"
