---
  class_name: "DownloadAvailableSensor"
  entry_point: "download_available_sensor.py"
  description: "Sensor which queries processing api for analyses available for download"
  poll_interval: 15 # Every 15 s
  trigger_types:
    -
      name: "download_available"
      description: "Trigger which indicates that an analysis is available for download"
      payload_schema:
        type: "object"
        properties:
         analysis_name:
           type: "string"
         analysis:
           type: "string"
         workpackage:
           type: "string"
         created_date:
           type: "string"
         process_location:
           type: "string"
         event:
           type: "string"
         timestamp:
           type: "string"
