---
name: "process_inbox_miarka"
pack: "ductus"
description: "Rule that triggers a processing action, when a experiment has been submitted to the inbox"
enabled: false

trigger:
    type: "arteria.runfolder_ready"

criteria:
    trigger.runfolder:
      type: "contains"
      pattern: "/projects/inbox/"
    trigger.process_location:
      type: "equals"
      pattern: "miarka"

action:
    ref: "ductus.process_inbox_miarka"
    parameters:
        runfolder: "{{trigger.runfolder}}"
        host: "{{trigger.host}}"
