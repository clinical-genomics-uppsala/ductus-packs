---
name: retrieve_result_wp_miarka
description: >
  Retrieve processed data from miarka
enabled: true
runner_type: orquesta
entry_point: workflows/retrieve_result_wp_miarka.yaml
pack: ductus
parameters:
  context:
    default: {}
    immutable: true
    type: object
  workflow:
    default: ductus.retrieve_result_wp_miarka
    immutable: true
    type: string
  runfolder:
    required: true
    type: string
  runfolder_port:
    required: true
    type: string
    default: "{{ config_context.miarka_runfolder_port }}"
  runfolder_api_version:
    required: true
    type: string
    default: "{{ config_context.miarka_runfolder_api_version }}"
  transfer_from_user:
    required: true
    type: string
    default: "{{ config_context.miarka_retrieve_user }}"
  transfer_from_key:
    required: true
    type: string
    default: "{{ config_context.miarka_retrieve_key }}"
  transfer_from_host:
    required: true
    type: string
    default: "{{ config_context.miarka_transfer_to_host }}"
  processing_api_service_url:
    required: true
    type: string
    default: "{{ config_context.processing_api_service_url }}"
  processing_api_access_key:
    required: true
    type: string
    default: "{{ config_context.processing_api_access_key }}"
  processing_api_analysis_tasks_url:
    required: true
    type: string
    default: "{{ config_context.processing_api_analysis_tasks_url }}"
  processing_api_analysis_update_status_url:
    required: true
    type: string
    default: "{{ config_context.processing_api_analysis_update_status_url }}"
  result_settings:
    required: true
    type: object
    default: "{{ config_context.result_settings }}"
  mail_settings:
    required: true
    type: object
    default: "{{ config_context.notification_mail }}"
