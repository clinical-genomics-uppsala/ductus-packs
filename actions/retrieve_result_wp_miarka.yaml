---
name: retrieve_result_wp_miarka
description: >
  Retrieve processed data from miarka
enabled: true
runner_type: orquesta
entry_point: workflows/retrieve_result_wp_miarka.yaml
pack: ductus
parameters:
  context:
    default: {}
    immutable: true
    type: object
  workflow:
    default: ductus.retrieve_result_wp_miarka
    immutable: true
    type: string
  analysis_name:
    required: true
    type: string
  analysis:
    required: true
    type: string
  workpackage:
    required: true
    type: string
  created_date:
    required: true
    type: string
  miarka_download_user:
    required: true
    type: string
    default: "{{ config_context.miarka_download_user }}"
  miarka_download_key:
    required: true
    type: string
    default: "{{ config_context.miarka_download_key }}"
  miarka_download_host:
    required: true
    type: string
    default: "{{ config_context.miarka_download_host }}"
  miarka_download_path_prefix:
    required: true
    type: string
    default: "{{ config_context.miarka_download_path_prefix }}"
  processing_api_service_url:
    required: true
    type: string
    default: "{{ config_context.processing_api_service_url }}"
  processing_api_access_key:
    required: true
    type: string
    default: "{{ config_context.processing_api_access_key }}"
  processing_api_analysis_tasks_url:
    required: true
    type: string
    default: "{{ config_context.processing_api_analysis_tasks_url }}"
  processing_api_analysis_update_status_url:
    required: true
    type: string
    default: "{{ config_context.processing_api_analysis_update_status_url }}"
  result_settings:
    required: true
    type: object
    default: "{{ config_context.result_settings }}"
  mail_settings:
    required: true
    type: object
    default: "{{ config_context.notification_mail }}"
