---
name: copy_data_to_miarka_for_processing
description: >
  Will move necessary files for a requested analysis to the miarka processing cluster
enabled: true
runner_type: orquesta
entry_point: workflows/copy_data_to_miarka_for_processing.yaml
pack: ductus
parameters:
  context:
    default: {}
    immutable: true
    type: object
  workflow:
    default: ductus.copy_data_to_miarka_for_processing
    immutable: true
    type: string
  analysis_name:
    required: true
    type: string
  processing_api_access_key:
    required: true
    type: string
    default: "{{ config_context.processing_api_access_key }}"
    secret: true
  processing_api_service_url:
    required: true
    type: string
    default: "{{ config_context.processing_api_service_url }}"
  processing_api_analysis_fastq_files_url:
    required: true
    type: string
    default: "{{ config_context.processing_api_analysis_fastq_files_url }}"
  processing_api_analysis_task_url:
    required: true
    type: string
    default: "{{ config_context.processing_api_analysis_task_url }}"
  processing_api_analysis_samples_url:
    required: true
    type: string
    default: "{{ config_context.processing_api_analysis_samples_url }}"
  processing_api_analysis_update_status_url:
    required: true
    type: string
    default: "{{ config_context.processing_api_analysis_update_status_url }}"
  miarka_transfer_to_host:
    required: true
    type: string
    default: "{{ config_context.miarka_transfer_to_host }}"
  miarka_transfer_key:
    required: true
    type: string
    default: "{{ config_context.miarka_transfer_key }}"
  miarka_transfer_user:
    required: true
    type: string
    default: "{{ config_context.miarka_transfer_user }}"
  miarka_path_prefix:
    required: true
    type: string
    default: "{{ config_context.miarka_path_prefix }}"
  hospital_transfer_staging_path:
    required: true
    type: string
    default: "{{ config_context.hospital_transfer_staging_path }}"
  mail_bioinfo:
    required: true
    type: string
    default: "{{ config_context.notification_mail_bioinfo }}"
