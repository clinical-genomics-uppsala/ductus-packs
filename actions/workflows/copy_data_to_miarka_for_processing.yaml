version: "1.0" # Orquest version

description: Will move necessary files for a requested analysis to the miarka processing cluster

input:
  - analysis_name
  - processing_api_access_key
  - processing_api_service_url
  - processing_api_analysis_fastq_files_url
  - processing_api_analysis_task_url
  - processing_api_analysis_samples_url
  - processing_api_analysis_update_status_url
  - miarka_transfer_to_host
  - miarka_transfer_key
  - miarka_transfer_user
  - hospital_transfer_staging_path
  - mail_bioinfo
  

vars:
  - failed_step: null
  - stderr: null
  - fastq_files: null
  - analysis_information: null
  - upload_path: null
  - samples_and_settings: null
  
tasks:
  get_fastq_file_list:
    action: core.local
    input:
      cmd: "curl -H 'Authorization: Api-Key <% ctx(processing_api_access_key) %>' <% ctx(processing_api_service_url) %><% ctx(processing_api_analysis_fastq_files_url) %>?analysis_name=<% ctx(analysis_name) %> | python3 -c 'import sys; import json; print(json.dumps([d[\"path\"] for d in json.load(sys.stdin)]))'"
    next:
      - when: <% succeeded() %>
        publish: fastq_files=<% result().stdout %>
        do:
          - create_staging_folder
      - when: <% failed() %>
        publish:
          - stderr: <% result() %>
          - failed_step: "get_fastq_file_list  -- Couldn't get fastq files for <% ctx(analysis_name) %>, <% result() %>"
        do:
          - bioinfo_error_notifier
 
  get_analysis_path:
    action: core.local
    input:
      cmd: "curl -H 'Authorization: Api-Key <% ctx(processing_api_access_key) %>' <% ctx(processing_api_service_url) %><% ctx(processing_api_analysis_task_url) %>?analysis_name=<% ctx(analysis_name) %> | python3 -c 'import sys; import json; data=json.load(sys.stdin); print(f\"\"\"/{data[\"workpackage\"]}_{data[\"analysis\"]}/{data[\"analysis_name\"]}\"\"\")'"
    next:
      - when: <% succeeded() %>
        publish: upload_path=<% result().stdout %>
        do:
          - create_staging_folder
      - when: <% failed() %>
        publish:
          - stderr: <% result() %>
          - failed_step: "get_analysis_path  -- Couldn't generate analysis path <% ctx(analysis_name) %>, <% result() %>"
        do:
          - bioinfo_error_notifier
  
#  create_analysis_folder:
#    join: all
#    action: core.remote
#    input:
#      username: <% ctx(transfer_user) %>
#      private_key: <% ctx(transfer_key) %>
#      cmd: mkdir -p <% ctx(upload_path) %>/fastq
#      hosts: <% ctx(transfer_to_host) %>
#    next:
#      - when: <% succeeded() %>
#        do:
#         - transfer_fastq_file
#         - create_json_file
#      - when: <% failed() %>
#        publish:
#          - stderr: <% result() %>
#          - failed_step: "create_analysis_folder  -- Could not create folder on <% ctx(upload_path) %>/fastq"
#        do:
#         - bioinfo_error_notifier

  create_staging_folder:
    join: all
    action: core.local
    input:
      #Editing path with sed to adapt marvin path in API to remote cluster staging file tree
      cmd: "mkdir -p  <% ctx(hospital_transfer_staging_path) %><% ctx(upload_path) %>/fastq"
    next:
      - when: <% succeeded() %>
        do:
         - link_fastq_files_staging
         - create_json_file_staging
      - when: <% failed() %>
        publish:
          - stderr: <% result() %>
          - failed_step: "create_staging_folder  -- Could not create staging folder in <% ctx(hospital_transfer_staging_path) %>"
        do:
         - bioinfo_error_notifier

  create_json_file_staging:
    action: core.local
    input:
      cmd: "curl -H 'Authorization: Api-Key <% ctx(processing_api_access_key) %>' <% ctx(processing_api_service_url) %><% ctx(processing_api_analysis_task_url) %>?analysis_name=<% ctx(analysis_name) %>  > <% ctx(hospital_transfer_staging_path) %><% ctx(upload_path) %>/samples_and_settings.json"
    next:
      - when: <% succeeded() %>
        do:
          - transfer_staging_dir
      - when: <% failed() %>
        publish:
          - stderr: "run_analysis failed"
          - failed_step: "create_json_file -- Couldn't create json file in <% ctx(hospital_transfer_staging_path) %><% ctx(upload_path) %>"
        do:
          - bioinfo_error_notifier
      
  link_fastq_files_staging:
    with:
      items: <% ctx(fastq_files) %>
    action: core.local
    input:
      #cmd: rsync.py -c -f "<% item() %>" -t <% ctx(upload_path) %>/fastq/ -u <% ctx(transfer_user) %> -i <% ctx(transfer_key) %> -r <% ctx(transfer_to_host) %> -p 2
      cmd: "ln -s -t <% ctx(hospital_transfer_staging_path) %><% ctx(upload_path) %>/fastq <% item() %>"
    next:
      - when: <% failed() %>
        publish:
          - stderr: "The linking of fastq files from hospital to transfer staging failed."
          - failed_step: "link_fastq_files_staging -- couldn't link fastq-file(s) to <% ctx(upload_path) %>/fastq/"
        do:
          - bioinfo_error_notifier
      - when: <% succeeded() %>
        do:
          - transfer_staging_dir

#set join here instead to guarantee json created before transf.
  transfer_staging_dir:
     action: core.local
     join: all
     input:
       cwd: <% ctx(hospital_transfer_staging_path) %>
#       cmd: rsync.py -c -f "<% item() %>" -t <% ctx(upload_path) %>/fastq/ -u <% ctx(transfer_user) %> -i <% ctx(transfer_key) %> -r <% ctx(transfer_to_host) %> -p 2
       # TODO:Convert to using rsync script above, but need to add support for realtive path (-R)?
       cmd:  "rsync -crRL -e 'ssh -i <% ctx(miarka_transfer_key) %>'  ./.<% ctx(upload_path) %> <%  ctx(miarka_transfer_user) %>@<% ctx(miarka_transfer_to_host) %>:"
     next:
       - when: <% failed() %>
         publish:
           - stderr: "The transfer of fastq files from hospital to miarka failed."
           - failed_step: "transfer_staging_dir -- couldn't transfer fastq-file(s) to <% ctx(upload_path) %>"
         do:
           - bioinfo_error_notifier
       - when: <% succeeded() %>
         do:
           - create_transfer_complete_file

  create_transfer_complete_file:
    action: core.local
    input:
      cwd: <% ctx(hospital_transfer_staging_path) %><% ctx(upload_path) %> 
      cmd: echo "`date`" > Done.txt;
    next:
      - when: <% failed() %>
        publish:
          - stderr: <% result() %>
          - failed_step: "create_transfer_complete_file -- Could not create Done.txt file on <% ctx(upload_path) %>"
        do:
          - bioinfo_error_notifier
      - when: <% succeeded() %>
        do:
          - rsync_transfer_complete_file

  rsync_transfer_complete_file:
     action: core.local
     input:
       cwd: <% ctx(hospital_transfer_staging_path) %>
       cmd:  "rsync -crRL -e 'ssh -i <% ctx(miarka_transfer_key) %>' ./.<% ctx(upload_path) %>/Done.txt <% ctx(miarka_transfer_user) %>@<% ctx(miarka_transfer_to_host) %>:" #+ ctx(upload_path) not needed?
     next:
       - when: <% failed() %>
         publish:
           - stderr: "The transfer of the Done.txt file to miarka failed."
           - failed_step: "rsync_transfer_complete_file -- couldn't transfer Done.txt to <% ctx(upload_path) %>"
         do:
           - bioinfo_error_notifier


  bioinfo_error_notifier:
    action: core.sendmail
    input:
      to: <% ctx(mail_bioinfo) %>
      from: stanley@clinicalgenomics-as.se
      subject: "[DUCTUS][WP][ERROR] - Pre-processing, <% ctx(analysis_name) %>"
      body: Something went wrong during the pre-processing of <% ctx(analysis_name) %>, please investigate!!!\n Failure message -- <% ctx(failed_step) %>, <% ctx(stderr) %>  Workflow execution id - <% ctx().st2.action_execution_id %>  Host - Hospital
    next:
      - when: <% succeeded() %>
        do:
          - update_processing_status_failed

  update_processing_status_failed:
    action: core.local
    input:
      cmd: "status=$(curl -o /dev/null -s --write-out '%{http_code}' -d  '{\"analysis_status\": \"FA\"}' -H 'Content-Type: application/json' -H 'Authorization: Api-Key <% ctx(processing_api_access_key) %>' -X PUT <% ctx(processing_api_service_url) %><% ctx(processing_api_analysis_update_status_url) %><% ctx(analysis_name) %>/); if [ $status != '202' ]; then echo $status; exit 1; fi"
    next:
      - when: <% succeeded() %>
        do:
          - fail

output:
  - stderr: <% ctx(stderr) %>
