version: "1.0" # mistral version
description: Will rsync result back from miarka

input:
  - analysis_name
  - analysis
  - workpackage
  - created_date
  - miarka_download_user
  - miarka_download_key
  - miarka_download_host
  - miarka_download_path_prefix
  - processing_api_service_url
  - processing_api_access_key
  - processing_api_analysis_tasks_url
  - processing_api_analysis_update_status_url
  - result_settings
  - mail_settings

vars:
  - analysis_name_result: null
  - fastq_storage_folder: null
  - result_storage_folder: null
  - run_year: null
  - samplesheet_storage_folder: null
  - stderr: null

tasks:

  # GMS560 can sometimes divide RNA and DNA experiments on multiple sequence runs
  # which they want to be saved in the same result folder. This experiments will
  # end with '-DNA' or '-RNA'.
  get_analysis_name_result:
    action: core.local
    input:
      cmd: python3 -c "import sys; import re; sys.stdout.write(re.sub(r'-[RD]NA$', '', '<% ctx(analysis_name) %>'))"
    next:
      - when: <% succeeded() %>
        publish: analysis_name_result=<% result().stdout %>
        do:
          - get_run_year
      - when: <% failed() %>
        publish:
          - stderr: <% result() %>
          - failed_step: 'get_analysis_name_result  -- Could not get analysis name for result'
        do:
          - bioinfo_error_notifier
          - error_notifier
          - update_processing_status_failed

  get_run_year:
    action: core.local
    input:
      cmd: "python3 -c 'import sys; sys.stdout.write(<% ctx(created_date) %>.split(\"-\")[0])'"
    next:
      - when: <% succeeded() %>
        publish: run_year=<% result().stdout %>
        do:
          - create_year_folder
      - when: <% failed() %>
        publish:
          - stderr: <% result() %>
          - failed_step: "get_run_year  -- Couldn't fetch created date from processing api for <% ctx(experiment_name) %>"
        do:
          - bioinfo_error_notifier
          - error_notifier
          - update_processing_status_failed


  create_year_folder:
    action: core.local
    input:
      cmd: mkdir -p <% ctx(result_settings).get(ctx(workpackage)).get(ctx(analysis)).get('result_location') %>/<% ctx(run_year) %>
    next:
      - when: <% succeeded() %>
        publish: 
          - result_storage_folder: <% ctx(result_settings).get(ctx(workpackage)).get(ctx(analysis)).get('result_location') %>/<% ctx(run_year) %>
        do:
          - transfer_result
      - when: <% failed() %>
        publish:
          - stderr: <% result() %>
          - failed_step: 'create_year_folder  -- Could not create folder <% ctx(result_settings).get(ctx(workpackage)).get(ctx(analysis)).get("result_location") %>/<% ctx(run_year) %>'
        do:
          - bioinfo_error_notifier
          - error_notifier
          - update_processing_status_failed


  transfer_result:
    action: core.local
    input:
      timeout: 86400
      cmd: rsync.py -c -f <% ctx(miarka_download_path_prefix) %>/<% ctx(workpackage) %>_<% ctx(analysis) %>/<% ctx(analysis_name) %>/ -t <% ctx(result_storage_folder) %>/<% ctx(analysis_name_result) %> -u <% ctx(miarka_download_user) %> -i <% ctx(miarka_download_key) %> -r <% ctx(miarka_download_host) %> -p 1
    retry:
      delay: 10
      count: 5
    next:
      - when: <% succeeded() %>
        do:
          - update_processing_status_delivered
          - result_retrieved
      - when: <% succeeded() and ctx(result_settings).get(ctx(workpackage)).get(ctx(analysis)).get("move_qc")  %>
        do:
          - create_qc_year_folder
      - when: <% failed() %>
        publish:
          - stderr: "The transfer of fastq files from compute to hospital failed."      #fix runfolder below
          - failed_step: 'transfer_result  -- Could not fetch result from <% ctx(miarka_download_host) %>\:<% ctx(runfolder) %>, <% result() %>'
        do:
          - bioinfo_error_notifier
          - error_notifier
          - update_processing_status_failed


  # KG wants to gather qc in a common batchQC folder
  create_qc_year_folder:
    action: core.local
    input:
      cmd: mkdir -p <% ctx(result_settings).get(ctx(workpackage)).get(ctx(analysis)).get('qc_location') %>/<% ctx(run_year) %>
    next:
      - when: <% succeeded() %>
        publish: 
          - result_qc_storage_folder: <% ctx(result_settings).get(ctx(workpackage)).get(ctx(analysis)).get('qc_location') %>/<% ctx(run_year) %>
        do:
          - mv_multiqc
      - when: <% failed() %>
        publish:
          - stderr: <% result() %>
          - failed_step: 'create_qc_year_folder -- Could not create year folder <% ctx(result_settings).get(ctx(workpackage)).get(ctx(analysis)).get("qc_location") %>/<% ctx(run_year) %>'
        do:
          - bioinfo_error_notifier
          - update_processing_status_failed
          - error_notifier

  mv_multiqc:
    action: core.local
    input:
      cwd: <% ctx(result_storage_folder) %>/<% ctx(analysis_name) %>
      cmd: bash -c 'for filename in $(ls multiqc_*.html); do mv $filename <% ctx(result_qc_storage_folder) %>/<% ctx(analysis_name) %>_${filename:$(expr match $filename multiqc_):-5}_multiqc.html ; done'
    next:
      - when: <% failed() %>
        publish:
          - stderr: <% result() %>
          - failed_step: 'mv_multiqc  -- Could not move multiqc_*.html to  <% ctx(result_qc_storage_folder) %>'
        do:
          - bioinfo_error_notifier
          - update_processing_status_failed
          - error_notifier

  error_notifier:
    action: core.sendmail
    input:
      to: <% ctx(mail_settings).get('lab').get(ctx(workpackage)) %>
      from: stanley@clinicalgenomics-as.se
      subject: "[DUCTUS][<% ctx(workpackage) %>][<% ctx(analysis) %>][ERROR] - Retrieve failure, <% ctx(analysis_name) %>"
      body: "Something went wrong when retrieving result for <% ctx(analysis_name) %>. A Bioinformatician has been notified."
    next:
      - when: <% succeeded() %>
        do:
          - update_processing_status_failed

  update_processing_status_failed:
    action: core.local
    input:
      cmd: "status=$(curl -o /dev/null -s --write-out '%{http_code}' -d  '{\"analysis_status\": \"FA\"}' -H 'Content-Type: application/json' -H 'Authorization: Api-Key <% ctx(processing_api_access_key) %>' -X PUT <% ctx(processing_api_service_url) %><% ctx(processing_api_analysis_update_status_url) %><% ctx(analysis_name) %>/); if [ $status != '202' ]; then echo $status; exit 1; fi"
    next:
      - when: <% succeeded() %>
        do:
          - fail

  bioinfo_error_notifier:
    action: core.sendmail
    input:
      to: <% ctx(mail_settings).get('bioinfo') %>
      from: stanley@clinicalgenomics-as.se
      subject: "[DUCTUS][<% ctx(workpackage) %>][<% ctx(analysis) %>][ERROR] - Retrieve, <% ctx(analysis_name) %>"
      body: Something went wrong during the retrieval of <% ctx(analysis_name) %>, please investigate!!!\n Failure message -- <% failed_step  %>, <% ctx(stderr) %> Workflow execution id - <% ctx().st2.action_execution_id %> Host - Hospital
    next:
      - when: <% succeeded() %>
        do:
          - fail


  update_processing_status_delivered:
    action: core.local
    input:
      cmd: "status=$(curl -o /dev/null -s --write-out '%{http_code}' -d  '{\"analysis_status\": \"DD\"}' -H 'Content-Type: application/json' -H 'Authorization: Api-Key <% ctx(processing_api_access_key) %>' -X PUT <% ctx(processing_api_service_url) %><% ctx(processing_api_analysis_update_status_url) %><% ctx(analysis_name) %>/); if [ $status != '202' ]; then echo $status; exit 1; fi"


  result_retrieved:
    action: core.sendmail
    input:
      to: <% ctx(mail_settings).get('lab').get(ctx(workpackage)) %>
      from: stanley@clinicalgenomics-as.se
      subject: "[DUCTUS][<% ctx(workpackage) %>][<% ctx(analysis) %>][SUCCESS] - Analysis available, <% ctx(analysis_name) %>"
      body: The result from analysis of <% ctx(analysis_name) %> can now be accessed. Workflow execution id - <% ctx().st2.action_execution_id %> Host - Hospital

output:
  - stderr: "<% ctx(stderr) %>"
